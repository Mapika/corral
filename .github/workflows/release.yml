name: release

# Tag a version (git tag v0.1.0 && git push --tags) and this builds desktop bundles for
# macOS (Apple silicon), Windows, and Linux, attached to a draft GitHub release.
# Builds are unsigned: macOS users right-click > Open past Gatekeeper the first time,
# Windows users click through SmartScreen. Signing can be added later without restructuring.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple silicon only — GitHub retired the Intel (macos-13) hosted runners.
          # Intel Mac users build from source; a universal build can come later.
          - platform: macos-latest
            bundles: dmg
          - platform: ubuntu-22.04
            bundles: appimage,deb
          - platform: windows-latest
            bundles: nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Linux system deps (webkit, tray, appimage tooling)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - run: npm ci

      - name: Stage Node sidecar for this target
        run: node scripts/prepare-sidecar.mjs

      - run: npm test

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Corral ${{ github.ref_name }}'
          releaseBody: 'Unsigned builds — macOS: right-click the app and choose Open the first time. Windows: SmartScreen → More info → Run anyway. Android: install the APK (allow unknown sources), then pair via the QR in the desktop titlebar.'
          releaseDraft: true
          args: --bundles ${{ matrix.bundles }}

  # The phone app: a thin paired client of a desktop Corral (no sidecar — see src-tauri/lib.rs).
  # Produces a self-signed arm64 APK for sideloading. Set ANDROID_KEYSTORE_B64 /
  # ANDROID_KEYSTORE_PASSWORD secrets to sign with a stable key (required for in-place upgrades);
  # without them each build signs with a fresh throwaway key.
  android:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    needs: build          # the desktop matrix (tauri-action) creates the draft release first
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Generate the Android project
        run: |
          export NDK_HOME="$ANDROID_NDK_LATEST_HOME"
          npx tauri android init --ci

      - name: Patch AndroidManifest (cleartext LAN pairing + camera for QR scan)
        run: |
          MANIFEST=src-tauri/gen/android/app/src/main/AndroidManifest.xml
          if grep -q usesCleartextTraffic "$MANIFEST"; then
            sed -i 's/android:usesCleartextTraffic="[^"]*"/android:usesCleartextTraffic="true"/' "$MANIFEST"
          else
            sed -i 's/<application/<application android:usesCleartextTraffic="true"/' "$MANIFEST"
          fi
          grep -q android.permission.CAMERA "$MANIFEST" || \
            sed -i 's#<uses-permission android:name="android.permission.INTERNET" */>#<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />#' "$MANIFEST"
          cat "$MANIFEST"

      - name: Build the APK (arm64)
        run: |
          export NDK_HOME="$ANDROID_NDK_LATEST_HOME"
          npx tauri android build --apk --target aarch64

      - name: Sign the APK
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          KS=corral.keystore
          if [ -n "${KEYSTORE_B64:-}" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$KS"
            PASS="$KEYSTORE_PASSWORD"
          else
            PASS=$(openssl rand -hex 16)
            keytool -genkeypair -keystore "$KS" -storepass "$PASS" -alias corral \
              -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Corral"
            echo "::notice::Signed with a throwaway key — set ANDROID_KEYSTORE_B64/_PASSWORD secrets for upgradeable builds."
          fi
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          APK=$(find src-tauri/gen/android -name '*-release-unsigned.apk' | head -1)
          [ -n "$APK" ] || { echo 'no unsigned APK found'; find src-tauri/gen/android -name '*.apk'; exit 1; }
          OUT="Corral_${GITHUB_REF_NAME#v}_arm64.apk"
          "$BT/zipalign" -f 4 "$APK" aligned.apk
          "$BT/apksigner" sign --ks "$KS" --ks-pass "pass:$PASS" --ks-key-alias corral --out "$OUT" aligned.apk
          "$BT/apksigner" verify "$OUT"
          echo "APK_NAME=$OUT" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: corral-android-apk
          path: ${{ env.APK_NAME }}

      - name: Attach the APK to the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          RELEASE_ID=$(gh api "repos/${GITHUB_REPOSITORY}/releases" --jq ".[] | select(.tag_name==\"${TAG}\") | .id" | head -1)
          if [ -n "$RELEASE_ID" ]; then
            gh api --method POST \
              -H "Content-Type: application/vnd.android.package-archive" \
              "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${APK_NAME}" \
              --input "$APK_NAME"
          else
            echo "::warning::No draft release found for ${TAG}; APK is available as a workflow artifact."
          fi
