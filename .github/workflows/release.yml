name: release

# Tag a version (git tag v0.1.0 && git push --tags) and this builds desktop bundles for
# macOS (Apple silicon), Windows, and Linux, attached to a draft GitHub release.
# Builds are unsigned: macOS users right-click > Open past Gatekeeper the first time,
# Windows users click through SmartScreen. Signing can be added later without restructuring.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple silicon only — GitHub retired the Intel (macos-13) hosted runners.
          # Intel Mac users build from source; a universal build can come later.
          - platform: macos-latest
            bundles: dmg
          - platform: ubuntu-22.04
            bundles: appimage,deb
          - platform: windows-latest
            bundles: nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: tauri-${{ matrix.platform }}   # restored from the ci rust-warm job on main

      - name: Linux system deps (webkit, tray, appimage tooling)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - run: npm ci

      - name: Stage Node sidecar for this target
        run: node scripts/prepare-sidecar.mjs

      - run: npm test

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater package signing (minisign — separate from OS code-signing). Losing this key
          # orphans every updater-enabled install; it lives ONLY in repo secrets + the keeper's
          # backup. tauri-action uploads latest.json + .sig alongside the installers.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Corral ${{ github.ref_name }}'
          releaseBody: 'Unsigned builds — macOS: right-click the app and choose Open the first time. Windows: SmartScreen → More info → Run anyway. Android: install the APK (allow unknown sources), then pair via the QR in the desktop titlebar.'
          releaseDraft: true
          args: --bundles ${{ matrix.bundles }}

  # The phone app, two flavors (slim paired client + pocket on-device runtime) — steps live in
  # the reusable android-apk workflow, which also runs standalone on the corral-pocket branch.
  # Set ANDROID_KEYSTORE_B64 / ANDROID_KEYSTORE_PASSWORD secrets to sign with a stable key
  # (required for in-place upgrades); without them each build signs with a fresh throwaway key.
  android:
    permissions:
      contents: write
    needs: build          # the desktop matrix (tauri-action) creates the draft release first
    uses: ./.github/workflows/android-apk.yml
    with:
      attach: true
    secrets: inherit
